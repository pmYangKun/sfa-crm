version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sqlite-data:/app/data
      - ./backend:/app
    environment:
      # spec 002 T037: ејәеҲ¶еҜҶй’Ҙд»Һ .env жіЁе…ҘпјӣзјәеӨұеҲҷ compose жӢ’з»қеҗҜеҠЁ
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/sfa_crm.db}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - LLM_KEY_FERNET_KEY=${LLM_KEY_FERNET_KEY:?LLM_KEY_FERNET_KEY must be set in .env}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - ENV=${ENV:-dev}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  sqlite-data:
