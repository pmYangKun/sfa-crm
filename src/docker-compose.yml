version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sqlite-data:/app/data
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///data/sfa_crm.db
      - JWT_SECRET=change-me-in-production
      - CORS_ORIGINS=http://localhost:3000
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  sqlite-data:
